params:
  training_experiment: baselines.train_gmmhmm
  validation_metric: best_ts_f1_score
  evaluation_metrics:
    - best_ts_f1_score
    - ts_auprc
    - best_ts_f1_score_classic
    - ts_auprc_unweighted
    - best_f1_score
    - auprc
dataset:
  name: SMDDataset
training_param_updates:
  dataset:
    name: SMDDataset
  training:
    epochs: 1
training_param_grid:
  dataset:
    pipeline:
      window:
        args:
          window_size:
            - 5
            - 10
          step_size:
            - 1
            - 5
detector_param_grid:
  detector_params:
    n_components:
      - 2
      - 4
      - 8
    n_mix:
      - 1
      - 2
      - 3
    n_iter:
      - 50
      - 100
